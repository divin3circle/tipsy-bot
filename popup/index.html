<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tipsy</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    </style>

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="brand"><span class="diamond">◆</span> Tipsy</div>
        <label class="switch" aria-label="Auto tip toggle">
          <input id="autoTipToggle" type="checkbox" checked />
          <span class="slider"></span>
        </label>
      </header>

      <main id="content" class="content"></main>

      <nav class="tabbar">
        <button data-tab="now" class="tab active">▶ Now</button>
        <button data-tab="explore" class="tab">🕘 History</button>
        <button data-tab="agentic" class="tab">↗ Agentic</button>
        <button data-tab="settings" class="tab">⚙ Settings</button>
      </nav>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
